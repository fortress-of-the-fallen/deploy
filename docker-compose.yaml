services:
  mongo:
    image: mongo:6.0
    restart: always
    ports:
        - '27017:27017'
    environment:
        MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOTUSER}
        MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOTPASSWORD}
        MONGO_INITDB_DATABASE: fortress_of_the_fallen
    volumes:
        - ./data/mongo:/data/db
        - ./mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
        - fotff
    extra_hosts:
        - 'host.docker.internal:host-gateway'

  redis:
    image: redis/redis-stack:latest
    ports:
        - '6379:6379'
        - '8011:8001'
    networks:
        - fotff
    extra_hosts:
        - 'host.docker.internal:host-gateway'

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    ports:
        - '9000:9000'
        - '9001:9001'
    volumes:
        - ./data/minio_data:/data
    environment:
        MINIO_ROOT_USER: ${MINIO_ROOTUSER}
        MINIO_ROOT_PASSWORD: ${MINIO_ROOTPASSWORD}
    command: server /data --console-address ":9001"
    extra_hosts:
        - 'host.docker.internal:host-gateway'

  mc-init:
    image: minio/mc
    depends_on:
        - minio
    entrypoint: >
        /bin/sh -c "
          sleep 5;
          mc alias set myminio http://minio:9000 ${MINIO_ROOTUSER} ${MINIO_ROOTPASSWORD} &&
          mc mb myminio/${MINIO_BUCKET_NAME} || true &&
          mc admin user add myminio ${MINIO_USER} ${MINIO_USERPASSWORD} &&
          mc admin policy attach myminio readwrite --user ${MINIO_USER}
          echo 'MinIO user created';
        "
  
  be-orchestrator:
    image: trkhang4444/fotf:1.0.0-be_staging
    depends_on:
      - mongo
      - redis
      - minio
    ports:
      - "3000:3000"
    networks:
      - fotff
    volumes:
      - ./appsettings.json:/usr/src/app/dist/src/appsettings.json:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command:
      - /bin/sh
      - -c
      - |
        NODE_PATH=/usr/src/app/dist node /usr/src/app/dist/src/main.js
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yml"
    volumes:
      - ./ngrok.yml:/etc/ngrok.yml
    networks:
      - fotff
    environment:
      - NGROK_AUTHTOKEN=2vYjT5j40edREjK6Qbpysfr5TyK_4qhEj643Y4rxNCHoM1wPo

networks:
   fotff:
